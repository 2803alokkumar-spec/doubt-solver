<!doctype html>
<html>
<head>
    <title>Doubt Solver</title>
    <style>
    body {
      font-family: Arial;
      background-color: #f2f2f2;
      text-align: center;
    }

    button {
      padding: 10px;
      margin: 10px;
      background-color: blue;
      color: white;
      border: none;
      border-radius: 5px;
    }

    div {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }
  </style>

</head>
<body>
    <h1>Welcome to Doubt Solver</h1>
    <p>Enter your name to continue:</p>
    <form action="/share" method="get">
        <input type="text" name="username" placeholder="Enter your name" required>
        <button type="submit">Go to Share Page</button>
    </form>
</body>
</html>
