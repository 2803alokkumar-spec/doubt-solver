<!doctype html>
<html>
<head>
    <title>All Problems</title>
</head>
<body>
    <h1>All Problems</h1>

    {% for problem, answers in data %}
        <div style="border:1px solid #000; padding:10px; margin:10px;">
            <p><strong>{{ problem[1] }} asked:</strong> {{ problem[2] }}</p>
            <p><strong>Answers:</strong></p>
            <ul>
                {% for ans in answers %}
                    <li>{{ ans[0] }}</li>
                {% endfor %}
            </ul>

            <!-- Add answer form -->
            <form action="/answer/{{ problem[0] }}" method="post">
                <input type="text" name="answer" placeholder="Write your answer" required>
                <button type="submit">Submit Answer</button>
            </form>
        </div>
    {% endfor %}
</body>
</html>
